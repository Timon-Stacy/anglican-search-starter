# CLOUD VPS (public IP + domain). A thin edge: terminates TLS and reverse-proxies
# HTTPS to the HOME app over the WireGuard tunnel. No GPU, no models, no DB here.
#
# WireGuard runs on the HOST (wg-quick — see deploy/docker/README.md), not in a
# container. Caddy runs with network_mode: host so it binds 80/443 on the public
# interface AND can reach the home app at its tunnel address (10.8.0.2:8001) via
# the host's wg0 route.
services:
  caddy:
    image: caddy:2
    container_name: edge-caddy
    network_mode: host
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # certs/keys — persist so you don't re-issue on restart
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
