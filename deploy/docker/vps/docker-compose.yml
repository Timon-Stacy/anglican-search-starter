# CLOUD VPS (public IP + domain). A thin edge: terminates TLS and reverse-proxies
# HTTPS to the HOME app over the WireGuard tunnel. No GPU, no models, no DB here.
#
# Two containers:
#   wireguard  - the tunnel endpoint the home box dials into (listens on 51820/udp).
#   caddy      - automatic HTTPS (Let's Encrypt); shares the wireguard netns so it
#                can reach the home app at its WG IP (e.g. 10.8.0.2:8001).
#
# Because caddy shares the wireguard network namespace, the public ports (80/443)
# AND the tunnel port (51820/udp) are all published on the wireguard service.
services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: edge-wg
    cap_add: [NET_ADMIN, SYS_MODULE]
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - ./wireguard:/config/wg_confs
      - /lib/modules:/lib/modules:ro
    ports:
      - "51820:51820/udp"   # WireGuard tunnel (open this in the provider firewall)
      - "80:80"             # HTTP  -> Caddy (ACME + redirect)
      - "443:443"           # HTTPS -> Caddy
      - "443:443/udp"       # HTTP/3
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: edge-caddy
    network_mode: "service:wireguard"
    depends_on: [wireguard]
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # certs/keys — persist so you don't re-issue on restart
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
