# HOME box (Intel Arc A380). Runs the whole app on the GPU. WireGuard runs on the
# HOST (wg-quick, set up once — see deploy/docker/README.md), not in a container,
# so the app has normal internet (model cache refresh, book imports) and the
# tunnel is a simple, reliable systemd service.
#
# The app publishes 8001 on the host. The host's wg0 interface is 10.8.0.2, so the
# VPS reaches the app over the tunnel at 10.8.0.2:8001. Home is behind NAT, so 8001
# is not exposed to the public internet — only the LAN and the tunnel can reach it.
services:
  bilson:
    build:
      # Build context is the repo root so the image can COPY src/ and scripts/.
      context: ../../..
      dockerfile: deploy/docker/home/Dockerfile.serve
      args:
        IPEX_TAG: ${IPEX_TAG:-2.7.10-xpu}
    image: anglican-bilson-xpu:latest
    container_name: anglican-bilson
    # Intel Arc GPU passthrough. Runs as root, so it can access /dev/dri.
    devices:
      - /dev/dri:/dev/dri
    env_file: .env
    ports:
      - "8001:8001"   # reachable at the host's WireGuard IP (10.8.0.2) for the VPS
    volumes:
      # library.db (the repaired copy), index.faiss, and accounts.db live here.
      - ./data:/data
      # Persist the Hugging Face cache across rebuilds (models are also baked in).
      - hf_cache:/opt/hf-cache
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8001/health',timeout=5).status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s   # model warmup on first boot
    restart: unless-stopped

  # One-off GPU tasks (verify the Arc, build the index). Same image as `bilson`.
  # In the "tools" profile so `docker compose up` never starts it; invoke with
  # `docker compose run --rm engine <cmd>`.
  engine:
    image: anglican-bilson-xpu:latest
    profiles: ["tools"]
    devices:
      - /dev/dri:/dev/dri
    env_file: .env
    volumes:
      - ./data:/data
      - hf_cache:/opt/hf-cache

volumes:
  hf_cache:
